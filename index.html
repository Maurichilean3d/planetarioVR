<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planetario VR - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        let scene, camera, renderer;
        let sun, earth, earthOrbitParent;

        init();
        animate();

        function init() {
            // 1. Crear la Escena
            scene = new THREE.Scene();

            // 2. Crear la Cámara
            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
            // Posicionamos la cámara un poco atrás y arriba para ver el sistema al iniciar
            camera.position.set(0, 1.6, 5); 

            // 3. Crear el Renderizador con soporte WebXR
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.xr.enabled = true; // ¡CRUCIAL para Meta Quest!
            document.body.appendChild(renderer.domElement);

            // 4. Añadir el botón de Entrar a VR
            document.body.appendChild(VRButton.createButton(renderer));

            // 5. Iluminación
            const ambientLight = new THREE.AmbientLight(0x333333);
            scene.add(ambientLight);

            const sunLight = new THREE.PointLight(0xffffff, 3, 100);
            scene.add(sunLight);

            // 6. Fondo de estrellas (Espacio)
            createStars();

            // 7. Crear los Astros
            // El Sol
            const sunGeometry = new THREE.SphereGeometry(0.8, 32, 32);
            const sunMaterial = new THREE.MeshBasicMaterial({ color: 0xffd700 }); // Brilla por sí mismo
            sun = new THREE.Mesh(sunGeometry, sunMaterial);
            sun.position.set(0, 1.6, 0); // Altura de los ojos aprox en VR (1.6m)
            scene.add(sun);

            // Pivote para la órbita de la Tierra
            earthOrbitParent = new THREE.Group();
            earthOrbitParent.position.copy(sun.position);
            scene.add(earthOrbitParent);

            // La Tierra
            const earthGeometry = new THREE.SphereGeometry(0.3, 32, 32);
            const earthMaterial = new THREE.MeshStandardMaterial({ color: 0x0077ff, roughness: 0.8 });
            earth = new THREE.Mesh(earthGeometry, earthMaterial);
            earth.position.set(3, 0, 0); // Distancia del Sol
            earthOrbitParent.add(earth);

            // Manejo de cambio de tamaño de pantalla
            window.addEventListener('resize', onWindowResize);
        }

        function createStars() {
            const starsGeometry = new THREE.BufferGeometry();
            const starsCount = 2000;
            const starPositions = new Float32Array(starsCount * 3);

            for (let i = 0; i < starsCount * 3; i++) {
                starPositions[i] = (Math.random() - 0.5) * 100;
            }

            starsGeometry.setAttribute('position', new THREE.BufferAttribute(starPositions, 3));
            const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1 });
            const starField = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(starField);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // 8. Bucle de Animación (Obligatorio usar setAnimationLoop para WebXR)
        function animate() {
            renderer.setAnimationLoop(render);
        }

        function render() {
            // Rotación de los astros sobre su propio eje
            sun.rotation.y += 0.002;
            earth.rotation.y += 0.01;

            // Rotación de la órbita (La Tierra gira alrededor del Sol)
            earthOrbitParent.rotation.y += 0.005;

            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
