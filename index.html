<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Milky Way VR - Three.js</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 10px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.7);
            font-family: sans-serif;
            pointer-events: none;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <div id="info">Entra en VR para ver la Vía Láctea</div>

    <script type="module">
        import * as THREE from 'three';
        import { VRButton } from 'three/addons/webxr/VRButton.js';

        let scene, camera, renderer, galaxy;

        init();

        function init() {
            // 1. Configuración principal
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000005); // Espacio profundo, no negro puro
            scene.fog = new THREE.FogExp2(0x000005, 0.0015); // Niebla para difuminar estrellas lejanas

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.xr.enabled = true;
            document.body.appendChild(renderer.domElement);
            document.body.appendChild(VRButton.createButton(renderer));

            // 2. Generación de la Vía Láctea (Procedural)
            createRealisticMilkyWay();

            // 3. Luces ambientales mínimas (opcional si añades objetos luego)
            const ambientLight = new THREE.AmbientLight(0x111122);
            scene.add(ambientLight);

            window.addEventListener('resize', onWindowResize);
            renderer.setAnimationLoop(render);
        }

        function createRealisticMilkyWay() {
            const starsCount = 100000; // 100 mil estrellas
            const geometry = new THREE.BufferGeometry();
            
            const positions = new Float32Array(starsCount * 3);
            const colors = new Float32Array(starsCount * 3);
            const sizes = new Float32Array(starsCount);

            // Colores del núcleo (cálido) y los brazos (frío)
            const colorCore = new THREE.Color(0xffddaa); 
            const colorArms = new THREE.Color(0x4466ff);

            for(let i = 0; i < starsCount; i++) {
                const i3 = i * 3;

                // Distribución matemática para simular un disco galáctico
                // r se concentra más hacia el centro usando Math.pow
                const r = 800 * Math.pow(Math.random(), 3); 
                const theta = Math.random() * Math.PI * 2;
                
                // El grosor del disco galáctico disminuye a medida que te alejas del centro
                const ySpread = Math.max(2, 60 - (r * 0.1)); 
                const y = (Math.random() - 0.5) * (Math.random() * ySpread);

                let x = r * Math.cos(theta);
                let z = r * Math.sin(theta);

                // Rotación espiral para simular brazos (suave)
                const spiralAngle = r * 0.005;
                const finalX = x * Math.cos(spiralAngle) - z * Math.sin(spiralAngle);
                const finalZ = x * Math.sin(spiralAngle) + z * Math.cos(spiralAngle);

                // Inclinación de la galaxia para que se vea cruzando el cielo
                const tilt = 0.6; // Inclinación en radianes
                const tiltedY = y * Math.cos(tilt) - finalZ * Math.sin(tilt);
                const tiltedZ = y * Math.sin(tilt) + finalZ * Math.cos(tilt);

                positions[i3] = finalX;
                positions[i3 + 1] = tiltedY;
                positions[i3 + 2] = tiltedZ;

                // Interpolar color basado en la distancia al centro
                const mixedColor = colorCore.clone().lerp(colorArms, Math.min(1.0, r / 300));
                
                // Variación de brillo aleatoria
                const brightness = 0.5 + Math.random() * 0.5;
                colors[i3] = mixedColor.r * brightness;
                colors[i3 + 1] = mixedColor.g * brightness;
                colors[i3 + 2] = mixedColor.b * brightness;

                // Tamaño de las estrellas
                sizes[i] = (Math.random() * 2.0) + 0.5;
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            // 3. Shader Material para estrellas circulares y brillantes (Mejor que PointsMaterial)
            const starMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 }
                },
                vertexShader: `
                    attribute float size;
                    attribute vec3 color;
                    varying vec3 vColor;
                    void main() {
                        vColor = color;
                        // Ajustar tamaño por perspectiva
                        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                        gl_PointSize = size * (400.0 / -mvPosition.z);
                        gl_Position = projectionMatrix * mvPosition;
                    }
                `,
                fragmentShader: `
                    varying vec3 vColor;
                    void main() {
                        // Crear un círculo suave en lugar de un cuadrado
                        vec2 xy = gl_PointCoord.xy - vec2(0.5);
                        float ll = length(xy);
                        if(ll > 0.5) discard;
                        
                        // Efecto de brillo radial
                        float alpha = 1.0 - (ll * 2.0);
                        alpha = pow(alpha, 1.5);
                        
                        gl_FragColor = vec4(vColor, alpha);
                    }
                `,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });

            galaxy = new THREE.Points(geometry, starMaterial);
            
            // Ubicamos al observador lejos del centro, en uno de los brazos galácticos
            galaxy.position.set(-150, -20, -100); 
            
            scene.add(galaxy);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function render() {
            // Rotación extremadamente lenta para dar sensación de inmensidad
            if (galaxy) {
                galaxy.rotation.y -= 0.0001;
            }
            renderer.render(scene, camera);
        }
    </script>
</body>
</html>
